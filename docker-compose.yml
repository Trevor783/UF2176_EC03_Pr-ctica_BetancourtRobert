services:
  postgres:
    image: postgres:16-alpine
    container_name: academia_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: academia
      POSTGRES_USER: quiz_user
      POSTGRES_PASSWORD: quiz_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./academia.sql:/docker-entrypoint-initdb.d/academia.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quiz_user -d academia"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    container_name: pgadmin4
    image: dpage/pgadmin4
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: root
    ports:
      - "5051:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
